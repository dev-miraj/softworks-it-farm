# SOFTWORKS IT FARM — Nginx Load Balancer Config
# Use this when running multiple API instances: docker compose scale api=3

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security ──────────────────────────────────────────────
    server_tokens off;
    more_clear_headers Server;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Performance ───────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Compression — gzip + brotli
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/xml image/svg+xml
        font/woff font/woff2;

    # Brotli (requires ngx_brotli module)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json;

    # ── Logging ───────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"ua":"$http_user_agent",'
        '"rt":"$request_time",'
        '"upstream_rt":"$upstream_response_time",'
        '"ip":"$http_x_forwarded_for"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Rate Limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # ── Upstream API Cluster ──────────────────────────────────
    upstream api_cluster {
        least_conn;
        server api:8080         weight=1 max_fails=3 fail_timeout=30s;
        # Add more instances when scaling:
        # server api2:8080      weight=1 max_fails=3 fail_timeout=30s;
        # server api3:8080      weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Server ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Health check (bypass rate limiting)
        location = /api/health {
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location = /api/ready {
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn perip 20;

            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  30s;
            proxy_send_timeout  30s;
            proxy_connect_timeout 5s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Cache headers passthrough
            proxy_pass_header Cache-Control;
            proxy_pass_header Expires;
        }

        # Auth routes — strict rate limiting
        location /api/auth/login {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SSE — disable buffering for real-time events
        location /api/events {
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # Swagger docs
        location /api/docs {
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Static assets — long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # HTML — no cache (SPA needs fresh index.html)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files $uri $uri/ /index.html;
        }

        # SPA fallback
        location / {
            limit_req zone=global burst=100 nodelay;
            try_files $uri $uri/ /index.html;
        }
    }
}
