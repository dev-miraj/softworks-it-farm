version: "3.9"

# ── Horizontal Scaling Config ──────────────────────────────────
# Usage:
#   docker compose -f docker-compose.scale.yml up -d
#   docker compose -f docker-compose.scale.yml up -d --scale api=3
#
# Requirements:
#   - .env file with all secrets
#   - Redis instance (or use the redis service below)

services:
  redis:
    image: redis:7-alpine
    container_name: softworks-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    networks:
      - softworks-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      NODE_ENV: production
      PORT: 8080
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://softworksit.vercel.app}
      CSRF_SECRET: ${CSRF_SECRET:-}
      ADMIN_IP_WHITELIST: ${ADMIN_IP_WHITELIST:-}
      IP_BLACKLIST: ${IP_BLACKLIST:-}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/ready"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - softworks-network

  nginx:
    image: nginx:1.25-alpine
    container_name: softworks-nginx-lb
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.lb.conf:/etc/nginx/nginx.conf:ro
      - ./artifacts/softworks/dist/public:/usr/share/nginx/html:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    depends_on:
      - api
    networks:
      - softworks-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: softworks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: softworks
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - softworks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  softworks-network:
    driver: bridge

volumes:
  postgres_data:
