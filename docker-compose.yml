version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: softworks-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      NEON_DATABASE_URL: ${NEON_DATABASE_URL}
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Softworks@2024}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://softworksit.vercel.app}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - softworks-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: softworks-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - softworks-network

networks:
  softworks-network:
    driver: bridge
