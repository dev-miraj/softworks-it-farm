kind = "web"
previewPath = "/"
title = "SOFTWORKS IT FARM"
version = "1.0.0"
id = "artifacts/softworks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21645

[services.development]
run = "pnpm --filter @workspace/softworks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/softworks", "run", "build" ]
publicDir = "artifacts/softworks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21645"
BASE_PATH = "/"
