components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Service:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - icon
        - category
        - features
        - isActive
        - createdAt

    CreateServiceBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
      required:
        - title
        - description
        - icon
        - category
        - features

    PortfolioItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        technologies:
          type: array
          items:
            type: string
        imageUrl:
          type: string
        projectUrl:
          type: string
        clientName:
          type: string
        isFeatured:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - category
        - technologies
        - imageUrl
        - clientName
        - isFeatured
        - createdAt

    CreatePortfolioItemBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        technologies:
          type: array
          items:
            type: string
        imageUrl:
          type: string
        projectUrl:
          type: string
        clientName:
          type: string
        isFeatured:
          type: boolean
      required:
        - title
        - description
        - category
        - technologies
        - imageUrl
        - clientName

    BlogPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        imageUrl:
          type: string
        authorName:
          type: string
        isPublished:
          type: boolean
        publishedAt:
          type: string
        createdAt:
          type: string
      required:
        - id
        - title
